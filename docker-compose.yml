services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: ggallery-backend
    container_name: ggallery-backend
    ports:
      - "${BACKEND_HOST}:8000:8000"
    env_file: .env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: ggallery-frontend
    container_name: ggallery-frontend
    ports:
      - "${FRONTEND_HOST}:3000:3000"
    env_file: .env
    depends_on:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"